name: Publish Skill

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Optional skill version override
        required: false
      publish-target:
        description: Publish target
        required: false
        default: production
        type: choice
        options:
          - production
          - staging
      allow-nonstable-production-version:
        description: Allow publishing a non-stable custom version to production
        required: false
        default: false
        type: boolean
      api-base-url:
        description: Optional broker API override
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      publish-target: ${{ steps.config.outputs.publish_target }}
      api-base-url: ${{ steps.config.outputs.api_base_url }}
      submit-indexnow: ${{ steps.config.outputs.submit_indexnow }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Prepare skill package
        id: package
        shell: bash
        run: |
          PACKAGE_DIR="publish-package-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "${PACKAGE_DIR}/references" "${PACKAGE_DIR}/schemas"
          cp SKILL.md "${PACKAGE_DIR}/"
          if [[ -f skill.json ]]; then
            cp skill.json "${PACKAGE_DIR}/"
          fi
          if [[ -f apis.json ]]; then
            cp apis.json "${PACKAGE_DIR}/"
          fi
          if [[ -f llms.txt ]]; then
            cp llms.txt "${PACKAGE_DIR}/"
          fi
          if compgen -G "references/*.md" >/dev/null; then
            cp references/*.md "${PACKAGE_DIR}/references/"
          fi
          if [[ -f schemas/skill.schema.json ]]; then
            cp schemas/skill.schema.json "${PACKAGE_DIR}/schemas/"
          fi
          echo "dir=${PACKAGE_DIR}" >> "$GITHUB_OUTPUT"
      - name: Resolve publish configuration
        id: config
        shell: bash
        run: |
          TARGET_INPUT="${{ github.event.inputs.publish-target }}"
          if [[ -z "$TARGET_INPUT" ]]; then
            TARGET_INPUT="production"
          fi

          API_BASE_URL_INPUT="${{ github.event.inputs.api-base-url }}"
          if [[ -n "$API_BASE_URL_INPUT" ]]; then
            API_BASE_URL="$API_BASE_URL_INPUT"
          elif [[ "$TARGET_INPUT" == "staging" ]]; then
            API_BASE_URL="https://registry-staging.hol.org/registry/api/v1"
          else
            API_BASE_URL="https://hol.org/registry/api/v1"
          fi

          SUBMIT_INDEXNOW="true"
          if [[ "$TARGET_INPUT" == "staging" ]]; then
            SUBMIT_INDEXNOW="false"
          fi

          echo "publish_target=$TARGET_INPUT" >> "$GITHUB_OUTPUT"
          echo "api_base_url=$API_BASE_URL" >> "$GITHUB_OUTPUT"
          echo "submit_indexnow=$SUBMIT_INDEXNOW" >> "$GITHUB_OUTPUT"
      - name: Resolve publish version
        id: version
        shell: bash
        run: |
          VERSION_INPUT="${{ github.event.inputs.version }}"
          if [[ -n "$VERSION_INPUT" ]]; then
            RESOLVED_VERSION="$VERSION_INPUT"
          elif [[ -n "${{ github.event.release.tag_name }}" ]]; then
            RESOLVED_VERSION="${{ github.event.release.tag_name }}"
            RESOLVED_VERSION="${RESOLVED_VERSION#v}"
          else
            RESOLVED_VERSION="$(node -p "require('./package.json').version")"
          fi

          echo "version=$RESOLVED_VERSION" >> "$GITHUB_OUTPUT"
      - name: Publish skill package
        if: steps.config.outputs.publish_target != 'staging'
        uses: hashgraph-online/skill-publish@5bd15487206db33996042021fcc54549b3ba90a7
        with:
          mode: publish
          api-key: ${{ secrets.RB_API_KEY }}
          api-base-url: ${{ steps.config.outputs.api_base_url }}
          version: ${{ steps.version.outputs.version }}
          skill-dir: ${{ steps.package.outputs.dir }}
          annotate: "true"
          submit-indexnow: ${{ steps.config.outputs.submit_indexnow }}
          allow-nonstable-production-version: ${{ github.event.inputs.allow-nonstable-production-version }}
          github-token: ${{ github.token }}
      - name: Publish skill package (staging)
        if: steps.config.outputs.publish_target == 'staging'
        uses: hashgraph-online/skill-publish@5bd15487206db33996042021fcc54549b3ba90a7
        with:
          mode: publish
          api-key: ${{ secrets.RB_API_KEY_STAGING }}
          api-base-url: ${{ steps.config.outputs.api_base_url }}
          version: ${{ steps.version.outputs.version }}
          skill-dir: ${{ steps.package.outputs.dir }}
          annotate: "true"
          submit-indexnow: ${{ steps.config.outputs.submit_indexnow }}
          allow-nonstable-production-version: ${{ github.event.inputs.allow-nonstable-production-version }}
          github-token: ${{ github.token }}
